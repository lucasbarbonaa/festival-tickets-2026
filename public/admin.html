<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Maestro | Zapucay Patio Criollo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #05070a;
            --card: #111827;
            --text: #ffffff;
            --muted: #94a3b8;
            --danger: #ef4444;
            --warning: #fbbf24;
            --success: #10b981;
            --rrpp: #3b82f6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid #1f2937;
            padding: 32px 24px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .sidebar h2 {
            color: var(--primary);
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
            font-size: 1.4rem;
        }
        .nav-btn {
            width: 100%;
            background: none;
            border: none;
            color: var(--muted);
            padding: 14px 16px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #1f2937; color: white; }
        .nav-btn.active {
            background: rgba(0,255,136,0.15);
            color: var(--primary);
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }
        .section {
            display: none;
        }
        .section.active { display: block; }
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 8px 0;
        }
        .stat-label {
            color: var(--muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #1f2937;
        }
        th {
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-admin   { background: rgba(0,255,136,0.15); color: var(--primary); }
        .badge-rrpp    { background: rgba(59,130,246,0.15); color: var(--rrpp); }
        .badge-staff   { background: rgba(251,191,36,0.15); color: var(--warning); }
        .badge-pending { background: rgba(251,191,36,0.15); color: var(--warning); }
        .badge-valid   { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-used    { background: rgba(239,68,68,0.15); color: var(--danger); }
        .btn-action {
            background: var(--primary);
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            margin: 8px 0;
        }
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-row > div { flex: 1; }
        .btn-save {
            background: var(--primary);
            color: black;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 16px;
        }
        #searchResults { margin-top: 24px; }
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .menu-toggle span {
            display: block;
            width: 30px;
            height: 4px;
            background: var(--primary);
            margin: 6px 0;
            transition: 0.3s;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
        }
            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                width: 260px;
                height: 100%;
                transition: left 0.3s ease;
                z-index: 1000;
                overflow-y: auto;
        }
            .sidebar.active {
                left: 0;
        }
            .main {
                margin-left: 0 !important;
                padding: 70px 20px 20px 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ADMIN</h2>
        <button class="nav-btn active" onclick="showSection('stats', this)">Estadísticas</button>
        <button class="nav-btn" onclick="showSection('pending', this)">Pendientes</button>
        <button class="nav-btn" onclick="showSection('inventory', this)">Inventario</button>
        <button class="nav-btn" onclick="showSection('users', this)">Usuarios</button>
        <button class="nav-btn" onclick="showSection('search', this)">Búsqueda Tickets</button>
        <button class="nav-btn" style="margin-top: 40px;" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="main">
        <!-- Estadísticas -->
        <div id="stats" class="section active">
            <h1>Panel de Control</h1>
            <div class="grid-stats">
                <div class="stat-card">
                    <div class="stat-label">Ingresos Totales</div>
                    <div class="stat-value" id="statRevenue">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Entradas Vendidas</div>
                    <div class="stat-value" id="statSold">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pendientes Aprobación</div>
                    <div class="stat-value" id="statPending">0</div>
                </div>
            </div>
        </div>

        <!-- Pendientes de aprobación -->
        <div id="pending" class="section">
            <h1>Pagos Pendientes</h1>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Monto</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listPending"></tbody>
            </table>
        </div>

        <!-- Gestión de Inventario -->
        <div id="inventory" class="section">
            <h1>Gestión de Tanda Activa</h1>
            <div class="form-row">
                <div>
                    <label>Nombre de la tanda</label>
                    <input type="text" id="invName" placeholder="Preventa Exclusiva">
                </div>
                <div>
                    <label>Precio por entrada</label>
                    <input type="number" id="invPrice" placeholder="15000">
                </div>
                <div>
                    <label>Stock disponible</label>
                    <input type="number" id="invStock" placeholder="500">
                </div>
            </div>
            <button class="btn-save" onclick="updateInventory()">Guardar Cambios</button>
        </div>

        <!-- Gestión de Usuarios -->
        <div id="users" class="section">
            <h1>Usuarios del Sistema</h1>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listUsers"></tbody>
            </table>

            <h2 style="margin-top: 40px;">Crear Nuevo Usuario</h2>
            <div class="form-row">
                <div>
                    <label>Nombre</label>
                    <input type="text" id="newUserName">
                </div>
                <div>
                    <label>Usuario (@)</label>
                    <input type="text" id="newUserUsername">
                </div>
                <div>
                    <label>PIN inicial</label>
                    <input type="text" id="newUserPin" maxlength="6">
                </div>
                <div>
                    <label>Rol</label>
                    <select id="newUserRole">
                        <option value="admin">Admin</option>
                        <option value="rrpp">RRPP</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" onclick="createUser()">Crear Usuario</button>
        </div>

        <!-- Búsqueda de Tickets -->
        <div id="search" class="section">
            <h1>Búsqueda de Entradas</h1>
            <input type="text" id="searchInput" placeholder="Buscar por nombre o DNI..." oninput="searchTickets()">
            <table id="searchResults">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listSearch"></tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        async function apiFetch(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
            const res = await fetch(url, options);
            if (res.status === 401 || res.status === 403) logout();
            return res.json();
        }

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (btn) btn.classList.add('active');

            if (id === 'stats') loadStats();
            if (id === 'pending') loadPending();
            if (id === 'users') loadUsers();
            if (id === 'search') document.getElementById('searchInput').focus();
        }

        async function loadStats() {
            const d = await apiFetch('/api/admin/stats');
            document.getElementById('statRevenue').textContent = `$${d.totalRevenue.toLocaleString('es-AR')}`;
            document.getElementById('statSold').textContent = d.totalSold;
            document.getElementById('statPending').textContent = d.pendingApproval;

            if (d.currentBatch) {
                document.getElementById('invName').value = d.currentBatch.name || '';
                document.getElementById('invPrice').value = d.currentBatch.price || '';
                document.getElementById('invStock').value = d.currentBatch.stock || '';
            }
        }

        async function loadPending() {
            const tickets = await apiFetch('/api/admin/tickets/pending');
            console.log('Respuesta cruda de la API:', tickets);
            document.getElementById('listPending').innerHTML = tickets.map(t => `
                <tr>
                    <td>${t.fullName}</td>
                    <td>$${t.price.toLocaleString('es-AR')}</td>
                    <td>
                        <button class="btn-action" onclick="approveTicket('${t.id}', '${t.whatsapp || ''}', '${t.fullName.replace(/'/g, "\\'")}')">
                            Aprobar
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function approveTicket(id, whatsapp, name) {
            if (!confirm(`¿Aprobar entrada de ${name}?`)) return;
            const res = await apiFetch(`/api/admin/tickets/approve/${id}`, { method: 'POST' });
            if (res.success) {
                alert('Entrada aprobada');
                loadPending();
                loadStats();
                if (whatsapp) {
                    const url = `${window.location.origin}/ticket.html?id=${id}`;
                    const msg = encodeURIComponent(`¡Hola ${name}! Tu entrada ya está activa: ${url}`);
                    window.open(`https://wa.me/${whatsapp}?text=${msg}`, '_blank');
                }
            } else {
                alert(res.error || 'Error al aprobar');
            }
        }

        async function loadUsers() {
            const users = await apiFetch('/api/admin/users');
            document.getElementById('listUsers').innerHTML = users.map(u => `
                <tr>
                    <td>${u.name}</td>
                    <td>@${u.username}</td>
                    <td><span class="badge badge-${u.role}">${u.role.toUpperCase()}</span></td>
                    <td>
                        ${u.role !== 'admin' ? `<button class="btn-danger" onclick="deleteUser('${u.username}')">Eliminar</button>` : '—'}
                    </td>
                </tr>
            `).join('');
        }

        async function createUser() {
            const name = document.getElementById('newUserName').value.trim();
            const username = document.getElementById('newUserUsername').value.trim().toLowerCase();
            const pin = document.getElementById('newUserPin').value.trim();
            const role = document.getElementById('newUserRole').value;

            if (!name || !username || !pin || pin.length < 4) {
                alert('Completa todos los campos correctamente (PIN mínimo 4 dígitos)');
                return;
            }

            const res = await apiFetch('/api/admin/users', {
                method: 'POST',
                body: JSON.stringify({ name, username, pin, role })
            });

            if (res.success) {
                alert('Usuario creado correctamente');
                loadUsers();
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserUsername').value = '';
                document.getElementById('newUserPin').value = '';
            } else {
                alert(res.error || 'Error al crear usuario');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`¿Eliminar usuario @${username}?`)) return;
            const res = await apiFetch(`/api/admin/users/${username}`, { method: 'DELETE' });
            if (res.success) {
                alert('Usuario eliminado');
                loadUsers();
            } else {
                alert(res.error || 'Error al eliminar');
            }
        }

        async function updateInventory() {
            const name = document.getElementById('invName').value.trim();
            const price = parseFloat(document.getElementById('invPrice').value);
            const stock = parseInt(document.getElementById('invStock').value);

            if (!name || isNaN(price) || isNaN(stock)) {
                alert('Completa todos los campos correctamente');
                return;
            }

            const res = await apiFetch('/api/admin/inventory', {
                method: 'POST',
                body: JSON.stringify({ name, price, stock })
            });

            if (res.success) {
                alert('Tanda actualizada correctamente');
                loadStats();
            } else {
                alert(res.error || 'Error al actualizar');
            }
        }

        async function searchTickets() {
            const q = document.getElementById('searchInput').value.trim();
            if (q.length < 3) {
                document.getElementById('listSearch').innerHTML = '';
                return;
            }

            const results = await apiFetch(`/api/admin/tickets/search?q=${encodeURIComponent(q)}`);
            document.getElementById('listSearch').innerHTML = results.map(t => `
                <tr>
                    <td>${t.fullName}</td>
                    <td><span class="badge badge-${t.status}">${t.status.toUpperCase()}</span></td>
                    <td>
                        ${t.status === 'pending' ? 
                            `<button class="btn-action" onclick="approveTicket('${t.id}', '${t.whatsapp || ''}', '${t.fullName.replace(/'/g, "\\'")}')">Aprobar</button>` 
                            : '—'}
                    </td>
                </tr>
            `).join('');
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        // Carga inicial
        window.onload = () => loadStats();
    </script>
</body>
</html>
