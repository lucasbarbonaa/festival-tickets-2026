<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival 2026 | Entradas Oficiales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #05070a;
            --card: #111827;
            --text: #ffffff;
            --muted: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }
        .logo {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }
        .logo span {
            color: var(--primary);
        }
        .btn-staff {
            text-decoration: none;
            color: var(--muted);
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid #334155;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-staff:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.1);
        }
        main {
            padding-top: 120px;
            text-align: center;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 3.5rem;
            margin: 0.5rem 0;
            line-height: 1.1;
            font-weight: 900;
        }
        .ticket-card {
            background: var(--card);
            border-radius: 16px;
            padding: 2.5rem;
            margin: 2rem auto;
            max-width: 420px;
            border: 1px solid rgba(0,255,136,0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .batch-name {
            color: var(--primary);
            font-weight: 900;
            font-size: 1.6rem;
            margin-bottom: 1rem;
        }
        .price {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary);
            margin: 1rem 0;
        }
        .price span {
            font-size: 2rem;
            vertical-align: top;
        }
        .stock-info {
            color: #f87171;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .btn-buy {
            display: inline-block;
            background: var(--primary);
            color: black;
            font-weight: 900;
            padding: 1.2rem 3rem;
            border-radius: 999px;
            text-decoration: none;
            margin-top: 2rem;
            font-size: 1.4rem;
            transition: 0.3s;
        }
        .btn-buy:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,255,136,0.3);
        }
        footer {
            margin-top: 4rem;
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .loader {
            border: 5px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 4rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .ticket-card { padding: 2rem; margin: 1.5rem; }
            .price { font-size: 3.2rem; }
            .btn-buy { padding: 1rem 2.5rem; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Festival <span>2026</span></div>
        <a href="/login.html" class="btn-staff">Staff / RRPP / Admin</a>
    </nav>

    <main>
        <section id="hero">
            <div id="content">
                <div class="loader"></div>
                <p style="color: var(--muted);">Cargando disponibilidad...</p>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 Festival Producciones. Todos los derechos reservados.
    </footer>

    <script>
        // Guardar referrer para RRPP (ej: ?ref=juanperez)
        const params = new URLSearchParams(window.location.search);
        const ref = params.get('ref');
        if (ref) {
            localStorage.setItem('referrer', ref.trim().toLowerCase());
            console.log('Referrer guardado:', ref);
        }

        async function loadLanding() {
            const content = document.getElementById('content');
            try {
                const res = await fetch('/api/public/batch');
                if (!res.ok) throw new Error('No hay tandas activas');
                const data = await res.json();

                content.innerHTML = `
                    <span style="color: var(--primary); font-weight: bold; letter-spacing: 2px; font-size: 1.2rem;">VIVE LA EXPERIENCIA</span>
                    <h1>NO TE QUEDES<br>AFUERA</h1>
                    <p style="font-size: 1.3rem; max-width: 600px; margin: 1.5rem auto; color: #d1d5db;">
                        Asegurá tu lugar en el evento del año. Comprá tu entrada de forma segura y recibila en tu email.
                    </p>
                    
                    <div class="ticket-card">
                        <div class="batch-name">${data.name}</div>
                        <div class="price"><span>$</span>${data.price.toLocaleString('es-AR')}</div>
                        <div class="stock-info">Quedan ${data.stock} disponibles</div>
                        <a href="/checkout.html" class="btn-buy">Comprar Entrada</a>
                    </div>
                `;
            } catch (err) {
                console.error('Error cargando tanda:', err);
                content.innerHTML = `
                    <h1>PRÓXIMAMENTE</h1>
                    <p style="font-size: 1.3rem; color: #94a3b8; max-width: 500px; margin: 2rem auto;">
                        No hay tandas activas en este momento.<br>Volvé a revisar pronto.
                    </p>
                `;
            }
        }

        loadLanding();
    </script>
</body>
</html>
