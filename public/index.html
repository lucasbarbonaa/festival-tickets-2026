<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapucay Patio Criollo | Entradas Oficiales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #05070a;
            --card: #111827;
            --text: #ffffff;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        .btn-staff {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #334155;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-staff:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.1);
        }
        main { padding-top: 120px; text-align: center; }
        h1 { font-size: 3.5rem; margin: 0.5rem 0; line-height: 1.1; }
        .ticket-card {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem auto;
            max-width: 420px;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .batch-name { color: var(--primary); font-weight: 900; font-size: 1.4rem; }
        .price { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 1rem 0; }
        .price span { font-size: 1.8rem; vertical-align: top; }
        .stock-info { color: #f87171; font-weight: 600; }
        .btn-buy {
            display: inline-block;
            background: var(--primary);
            color: black;
            font-weight: 900;
            padding: 1rem 2.5rem;
            border-radius: 999px;
            text-decoration: none;
            margin-top: 1.5rem;
            font-size: 1.3rem;
            transition: 0.3s;
        }
        .btn-buy:hover { transform: scale(1.05); }
        footer {
            margin-top: 4rem;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Zapucay Patio Criollo <span>2026</span></div>
        <a href="/login.html" class="btn-staff">Staff / RRPP / Admin</a>
    </nav>

    <main>
        <section id="hero">
            <div id="content">
                <div class="loader" style="margin: 4rem auto;"></div>
                <p style="color:var(--text-muted);">Cargando disponibilidad...</p>
            </div>
        </section>
    </main>

    <footer>
        &copy; TuTuX Producciones. Todos los derechos reservados. San Bernardo-Chaco<br>
        Instagram: @zapucaypatiocriollo | WhatsApp: 549 362 4036943
    </footer>

    <script>
        // Guardar referrer para RRPP (ej: https://tudominio.com/?ref=juanperez)
        const params = new URLSearchParams(window.location.search);
        const ref = params.get('ref');
        if (ref) localStorage.setItem('referrer', ref.trim().toLowerCase());

        async function loadLanding() {
            const content = document.getElementById('content');
            try {
                const res = await fetch('/api/public/batch');
                if (!res.ok) throw new Error('No hay tandas activas');
                const data = await res.json();

                content.innerHTML = `
                    <span style="color: var(--primary); font-weight: bold; letter-spacing: 2px; font-size: 1.2rem;">VIVE LA EXPERIENCIA</span>
                    <h1>NO TE QUEDES<br>AFUERA</h1>
                    <p style="font-size: 1.3rem; max-width: 600px; margin: 1.5rem auto; color: #d1d5db;">
                        Asegurá tu lugar en el evento del año. Comprá tu entrada de forma segura y recibila en tu whatsapp.
                    </p>
                    
                    <div class="ticket-card">
                        <div class="batch-name">${data.name}</div>
                        <div class="price"><span>$</span>${data.price.toLocaleString('es-AR')}</div>
                        <div class="stock-info">Quedan ${data.stock} disponibles</div>
                        <a href="/checkout.html" class="btn-buy">Comprar Entrada</a>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `
                    <h1>PRÓXIMAMENTE</h1>
                    <p style="font-size: 1.3rem; color: #94a3b8; max-width: 500px; margin: 2rem auto;">
                        No hay tandas activas en este momento.<br>Volvé a revisar pronto.
                    </p>
                `;
            }
        }

        loadLanding();
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('overlay');

        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.style.display = 'none';
            });

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('active');
                        overlay.style.display = 'none';
                    }
            });
             
                

    
    </script>
    <button id="menuToggle" class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div id="overlay" class="overlay"></div>
    
</body>
</html>
