<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel RRPP | Festival 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --success: #00ff88;
            --bg: #05070a;
            --card: #111827;
            --text: #ffffff;
            --muted: #94a3b8;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* === RESPONSIVE MENU === */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .menu-toggle span {
            display: block;
            width: 30px;
            height: 4px;
            background: var(--primary);
            margin: 6px 0;
            transition: 0.3s;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                width: 260px;
                height: 100%;
                transition: left 0.3s ease;
                z-index: 1000;
                overflow-y: auto;
            }
            .sidebar.active { left: 0; }
            .main {
                margin-left: 0 !important;
                padding: 70px 20px 20px 20px;
            }
        }

        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid #1f2937;
            padding: 32px 24px;
            box-sizing: border-box;
            overflow-y: auto;
            transition: left 0.3s ease;
        }
        .sidebar h2 {
            color: var(--primary);
            font-weight: 900;
            margin: 0 0 40px 0;
        }
        .nav-btn {
            width: 100%;
            background: none;
            border: none;
            color: var(--muted);
            padding: 14px 16px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #1f2937; color: white; }
        .nav-btn.active {
            background: rgba(59,130,246,0.15);
            color: var(--primary);
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        .big-number {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--success);
            margin: 8px 0;
        }
        .label {
            color: var(--muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .ref-box {
            background: rgba(59,130,246,0.1);
            border: 2px dashed var(--primary);
            padding: 24px;
            border-radius: 16px;
            margin: 32px 0;
        }
        .ref-link {
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            margin: 16px 0;
            font-size: 1.1rem;
        }
        .btn-copy {
            background: var(--primary);
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 900;
            cursor: pointer;
        }
        form {
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .btn-submit {
            width: 100%;
            background: var(--success);
            color: black;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 999px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }
        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #1f2937;
        }
        th {
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .status-valid { color: var(--success); font-weight: bold; }
        .status-used  { color: var(--muted); }
    </style>
</head>
<body>

    <!-- Botón hamburguesa (solo móvil) -->
    <button id="menuToggle" class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <div class="sidebar">
        <h2>RRPP</h2>
        <button class="nav-btn active" onclick="showSection('dashboard', this)">Dashboard</button>
        <button class="nav-btn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="main">
        <div id="dashboard" class="section active">
            <h1>Panel RRPP</h1>
            <div class="grid">
                <div class="card">
                    <div class="label">Entradas Vendidas</div>
                    <div class="big-number" id="totalTickets">0</div>
                </div>
                <div class="card">
                    <div class="label">Ingresos Generados</div>
                    <div class="big-number" id="totalRevenue">$0</div>
                </div>
            </div>

            <div class="ref-box">
                <h2>Tu Link de Referido</h2>
                <p>Comparte este link para que tus ventas se registren automáticamente:</p>
                <div class="ref-link" id="refLink"></div>
                <button class="btn-copy" onclick="copyLink()">Copiar Link</button>
            </div>

            <!-- Formulario de venta directa - comentado si no lo usás -->
            <!-- <form id="sellForm"> ... </form> -->
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const username = user.username || 'tuusuario';

        const baseUrl = window.location.origin;
        document.getElementById('refLink').textContent = `${baseUrl}/?ref=${username}`;

        async function apiFetch(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
            const res = await fetch(url, options);
            if (res.status === 401 || res.status === 403) logout();
            return res.json();
        }

        async function loadDashboard() {
            const data = await apiFetch('/api/rrpp/stats');
            document.getElementById('totalTickets').textContent = data.totalTickets || 0;
            document.getElementById('totalRevenue').textContent = 
                `$${Math.round(data.totalRevenue || 0).toLocaleString('es-AR')}`;
            // ... resto de tu código de loadDashboard ...
        }

        // Toggle menú móvil
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('overlay');

        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.style.display = 'none';
            });
        }

        function copyLink() {
            const link = document.getElementById('refLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copiado!');
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
