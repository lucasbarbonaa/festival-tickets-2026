<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff / Admin / RRPP | Festival 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #05070a;
            --card: #111827;
            --text: #ffffff;
            --muted: #94a3b8;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--card);
            padding: 40px 32px;
            border-radius: 24px;
            border: 1px solid #1f2937;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: var(--primary);
            font-weight: 900;
            margin: 0 0 8px 0;
            font-size: 2.2rem;
        }
        .subtitle {
            color: var(--muted);
            margin-bottom: 32px;
            font-size: 1rem;
        }
        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.15);
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: black;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 16px;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,255,136,0.3);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: var(--danger);
            margin-top: 16px;
            font-size: 0.95rem;
            display: none;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Panel de Control</h1>
        <p class="subtitle">Staff • RRPP • Administración</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ej: admin o tuusuario" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="pin">PIN de acceso</label>
                <input type="password" id="pin" placeholder="••••" required autocomplete="current-password" maxlength="6">
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                Ingresar
            </button>

            <div class="error-msg" id="errorMsg">
                Credenciales incorrectas. Intenta nuevamente.
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim().toLowerCase();
            const pin = document.getElementById('pin').value.trim();

            if (!username || !pin) {
                errorMsg.textContent = "Completa ambos campos";
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Ingresando<span class="loader"></span>';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, pin })
                });

                const data = await response.json();

                if (response.ok && data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirección según rol
                    const role = data.user.role.toLowerCase();
                    if (role === 'admin') {
                        window.location.href = '/admin.html';
                    } else if (role === 'rrpp') {
                        window.location.href = '/rrpp.html';
                    } else if (role === 'staff') {
                        window.location.href = '/staff.html';
                    } else {
                        alert('Rol no reconocido. Contacta al administrador.');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Ingresar';
                    }
                } else {
                    errorMsg.textContent = data.error || 'Credenciales inválidas';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Ingresar';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Error de conexión. Intenta más tarde.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar';
            }
        });

        // Auto-redirección si ya hay sesión activa
        window.onload = () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');

            if (token && user) {
                try {
                    const parsedUser = JSON.parse(user);
                    const role = parsedUser.role?.toLowerCase();

                    if (role === 'admin') window.location.href = '/admin.html';
                    else if (role === 'rrpp') window.location.href = '/rrpp.html';
                    else if (role === 'staff') window.location.href = '/staff.html';
                } catch (e) {
                    localStorage.clear();
                }
            }
        };
    </script>
</body>
</html>
